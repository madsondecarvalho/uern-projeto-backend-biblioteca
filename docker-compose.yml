services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: biblioteca
      POSTGRES_USER: biblioteca
      POSTGRES_PASSWORD: biblioteca123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biblioteca -d biblioteca"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3333:3333"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: biblioteca
      DB_USER: biblioteca
      DB_PASSWORD: biblioteca123
      JWT_SECRET: biblioteca-jwt-secret
    command: >
      sh -c "
        echo 'Aguardando PostgreSQL aceitar conexões...' &&
        while ! timeout 1 bash -c 'cat < /dev/null > /dev/tcp/postgres/5432' 2>/dev/null; do
          sleep 1
        done &&
        echo 'PostgreSQL pronto. Executando migrations...' &&
        npx sequelize-cli db:migrate &&
        echo 'Iniciando API...' &&
        node server.js
      "

volumes:
  postgres_data:
