services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: biblioteca
      MYSQL_USER: biblioteca
      MYSQL_PASSWORD: biblioteca123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-P", "3306"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build: .
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "3333:3333"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: biblioteca
      DB_USER: biblioteca
      DB_PASSWORD: biblioteca123
      JWT_SECRET: biblioteca-jwt-secret
    command: >
      sh -c "
        echo 'Aguardando MySQL aceitar conexões TCP...' &&
        while ! timeout 1 bash -c 'cat < /dev/null > /dev/tcp/mysql/3306' 2>/dev/null; do
          sleep 1
        done &&
        echo 'MySQL pronto. Executando migrations e seeds...' &&
        npx sequelize-cli db:migrate &&
        npx sequelize-cli db:seed:all &&
        echo 'Iniciando API...' &&
        node server.js
      "

volumes:
  mysql_data:
